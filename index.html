<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Galerie</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

</head>

<body>

<a-scene background="color: #1a1a1a" shadow="type: pcfsoft">

<!-- Assets -->
<a-assets>
<img id="bild1" src="foto1.jpeg">
<img id="bild2" src="foto2.jpeg">
<img id="bild3" src="foto3.jpeg">
<img id="bild4" src="foto4.jpeg">
</a-assets>

<!-- Licht -->
<a-light type="ambient" intensity="0.8"></a-light>
<a-light type="directional" intensity="0.7" position="0 8 2" castShadow="true"></a-light>

<!-- Boden -->
<a-plane
rotation="-90 0 0"
width="20"
height="20"
color="#8b6f47">
</a-plane>

<!-- Wände -->
<a-box position="0 2 -6" width="12" height="4" depth="0.2" color="#eeeeee"></a-box>
<a-box position="0 2 6" width="12" height="4" depth="0.2" color="#eeeeee"></a-box>
<a-box position="-6 2 0" width="0.2" height="4" depth="12" color="#dddddd"></a-box>
<a-box position="6 2 0" width="0.2" height="4" depth="12" color="#dddddd"></a-box>

<!-- Glasdach -->
<a-box
position="0 4 0"
width="12"
height="0.05"
depth="12"
material="color:#dff6ff; opacity:0.25; transparent:true">
</a-box>

<!-- Dachstreben -->
<a-box position="0 4 0" width="12" height="0.1" depth="0.1" color="#888"></a-box>
<a-box position="0 4 3" width="12" height="0.1" depth="0.1" color="#888"></a-box>
<a-box position="0 4 -3" width="12" height="0.1" depth="0.1" color="#888"></a-box>

<!-- Bilder -->

<a-entity position="-3 2 -5.9">
<a-box depth="0.1" width="3.2" height="2.2" position="0 0 -0.02" color="#000"></a-box>
<a-plane src="#bild1" width="3" height="2" position="0 0 0.05"></a-plane>
</a-entity>

<a-entity position="3 2 -5.9">
<a-box depth="0.1" width="3.2" height="2.2" position="0 0 -0.02" color="#000"></a-box>
<a-plane src="#bild2" width="3" height="2" position="0 0 0.05"></a-plane>
</a-entity>

<a-entity position="-3 2 5.9" rotation="0 180 0">
<a-box depth="0.1" width="3.2" height="2.2" position="0 0 -0.02" color="#000"></a-box>
<a-plane src="#bild3" width="3" height="2" position="0 0 0.05"></a-plane>
</a-entity>

<a-entity position="3 2 5.9" rotation="0 180 0">
<a-box depth="0.1" width="3.2" height="2.2" position="0 0 -0.02" color="#000"></a-box>
<a-plane src="#bild4" width="3" height="2" position="0 0 0.05"></a-plane>
</a-entity>

<!-- Spotlights -->

<a-light type="spot" position="-3 3 -4" rotation="-60 0 0" angle="30" intensity="1"></a-light>
<a-light type="spot" position="3 3 -4" rotation="-60 0 0" angle="30" intensity="1"></a-light>

<a-light type="spot" position="-3 3 4" rotation="-60 180 0" angle="30" intensity="1"></a-light>
<a-light type="spot" position="3 3 4" rotation="-60 180 0" angle="30" intensity="1"></a-light>

<!-- Navigation mesh -->
<a-plane
id="navmesh"
class="teleport"
rotation="-90 0 0"
width="20"
height="20"
color="#00ff00"
opacity="0.2">
</a-plane>

<!-- Kamera Rig -->

<a-entity id="rig">

<a-entity camera position="0 1.6 3" look-controls wasd-controls></a-entity>

<a-entity
laser-controls="hand: left"
raycaster="objects: .teleport"
teleport-controls="cameraRig: #rig; teleportOrigin: #rig"; button: trigger>
</a-entity>

<a-entity meta-touch-controls="hand: right"></a-entity>

<!--<a-entity
    oculus-touch-controls="hand: right">
  </a-entity> -->

<!-- <a-entity
laser-controls="hand: right"
raycaster="objects: .teleport"
teleport-controls="cameraRig: #rig; teleportOrigin: #rig"; button: trigger>
</a-entity> -->

</a-entity>

</a-scene>

</body>
</html>
